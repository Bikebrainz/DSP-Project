<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>emcast — signal viewer</title>
<style>
  :root { --bg:#0b0f14; --panel:#121922; --ink:#e7eef7; --muted:#8aa0b4; --accent:#34d3a6; }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--ink);
         font:14px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
  header { padding:20px 24px; border-bottom:1px solid #1d2733; }
  h1 { margin:0; font-size:18px; letter-spacing:.5px; }
  h1 span { color:var(--accent); }
  p.sub { margin:4px 0 0; color:var(--muted); }
  main { padding:24px; max-width:1000px; margin:0 auto; }
  .drop { border:1px dashed #2a3a4d; border-radius:12px; padding:28px; text-align:center;
          color:var(--muted); cursor:pointer; transition:.15s; background:var(--panel); }
  .drop.drag { border-color:var(--accent); color:var(--ink); }
  .card { background:var(--panel); border:1px solid #1d2733; border-radius:12px;
          padding:16px; margin-top:20px; }
  .card h2 { margin:0 0 10px; font-size:13px; text-transform:uppercase;
             letter-spacing:1px; color:var(--muted); }
  canvas { width:100%; display:block; border-radius:8px; background:#05080c; }
  .meta { display:flex; gap:24px; flex-wrap:wrap; color:var(--muted); }
  .meta b { color:var(--ink); font-weight:600; }
  .hint { color:var(--muted); font-size:12px; margin-top:8px; }
  a { color:var(--accent); }
</style>
</head>
<body>
<header>
  <h1>em<span>cast</span> — signal viewer</h1>
  <p class="sub">Drop a WAV produced by <code>emcast send</code> to see its waveform and spectrogram.</p>
</header>
<main>
  <div id="drop" class="drop">
    Drop a <b>.wav</b> file here, or click to choose one.
    <input id="file" type="file" accept=".wav,audio/wav" hidden />
  </div>

  <div id="results" hidden>
    <div class="card">
      <h2>File</h2>
      <div class="meta" id="meta"></div>
    </div>
    <div class="card">
      <h2>Waveform</h2>
      <canvas id="wave" width="960" height="160"></canvas>
    </div>
    <div class="card">
      <h2>Spectrogram</h2>
      <canvas id="spec" width="960" height="256"></canvas>
      <div class="hint">Time → right, frequency → up (0 to Nyquist). Brighter = stronger.</div>
    </div>
  </div>
</main>

<script>
// ---- minimal radix-2 FFT (in-place, complex) -------------------------------
function fft(re, im) {
  const n = re.length;
  for (let i = 1, j = 0; i < n; i++) {
    let bit = n >> 1;
    for (; j & bit; bit >>= 1) j ^= bit;
    j ^= bit;
    if (i < j) { [re[i], re[j]] = [re[j], re[i]]; [im[i], im[j]] = [im[j], im[i]]; }
  }
  for (let len = 2; len <= n; len <<= 1) {
    const ang = -2 * Math.PI / len;
    const wr = Math.cos(ang), wi = Math.sin(ang);
    for (let i = 0; i < n; i += len) {
      let cr = 1, ci = 0;
      for (let k = 0; k < len / 2; k++) {
        const a = i + k, b = i + k + len / 2;
        const tr = re[b] * cr - im[b] * ci;
        const ti = re[b] * ci + im[b] * cr;
        re[b] = re[a] - tr; im[b] = im[a] - ti;
        re[a] += tr; im[a] += ti;
        const ncr = cr * wr - ci * wi; ci = cr * wi + ci * wr; cr = ncr;
      }
    }
  }
}

function drawWaveform(canvas, data) {
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0, 0, w, h);
  ctx.strokeStyle = '#34d3a6'; ctx.lineWidth = 1; ctx.beginPath();
  const step = Math.max(1, Math.floor(data.length / w));
  for (let x = 0; x < w; x++) {
    let min = 1, max = -1;
    for (let i = x * step; i < (x + 1) * step && i < data.length; i++) {
      if (data[i] < min) min = data[i];
      if (data[i] > max) max = data[i];
    }
    ctx.moveTo(x, (1 - (max * 0.5 + 0.5)) * h);
    ctx.lineTo(x, (1 - (min * 0.5 + 0.5)) * h);
  }
  ctx.stroke();
}

function colormap(t) { // dark blue -> cyan -> yellow -> red
  t = Math.max(0, Math.min(1, t));
  const stops = [[0,0,51],[0,102,204],[0,230,179],[242,242,26],[230,26,13]];
  const x = t * (stops.length - 1), i = Math.min(stops.length - 2, Math.floor(x)), f = x - i;
  const c = k => Math.round(stops[i][k] + f * (stops[i + 1][k] - stops[i][k]));
  return [c(0), c(1), c(2)];
}

function drawSpectrogram(canvas, data) {
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  const N = 512, hop = 256, bins = N / 2;
  const frames = Math.max(1, Math.floor((data.length - N) / hop));
  const img = ctx.createImageData(w, h);
  const hann = new Float32Array(N);
  for (let n = 0; n < N; n++) hann[n] = 0.5 * (1 - Math.cos(2 * Math.PI * n / (N - 1)));

  // Precompute magnitudes per frame, then map onto the canvas grid.
  const mags = new Float32Array(frames * bins);
  let peak = 1e-9;
  const re = new Float64Array(N), im = new Float64Array(N);
  for (let f = 0; f < frames; f++) {
    const s = f * hop;
    for (let n = 0; n < N; n++) { re[n] = data[s + n] * hann[n]; im[n] = 0; }
    fft(re, im);
    for (let k = 0; k < bins; k++) {
      const m = Math.hypot(re[k], im[k]);
      mags[f * bins + k] = m;
      if (m > peak) peak = m;
    }
  }
  for (let x = 0; x < w; x++) {
    const f = Math.min(frames - 1, Math.floor(x / w * frames));
    for (let y = 0; y < h; y++) {
      const k = Math.min(bins - 1, Math.floor((1 - y / h) * bins));
      const db = 20 * Math.log10(Math.max(mags[f * bins + k] / peak, 1e-6));
      const t = (db + 60) / 60;
      const [r, g, b] = colormap(t);
      const o = (y * w + x) * 4;
      img.data[o] = r; img.data[o + 1] = g; img.data[o + 2] = b; img.data[o + 3] = 255;
    }
  }
  ctx.putImageData(img, 0, 0);
}

async function handleFile(file) {
  const buf = await file.arrayBuffer();
  const ac = new (window.AudioContext || window.webkitAudioContext)();
  const audio = await ac.decodeAudioData(buf);
  const data = audio.getChannelData(0);

  document.getElementById('results').hidden = false;
  document.getElementById('meta').innerHTML =
    `<div>Name: <b>${file.name}</b></div>` +
    `<div>Sample rate: <b>${audio.sampleRate} Hz</b></div>` +
    `<div>Duration: <b>${audio.duration.toFixed(2)} s</b></div>` +
    `<div>Samples: <b>${data.length.toLocaleString()}</b></div>`;
  drawWaveform(document.getElementById('wave'), data);
  drawSpectrogram(document.getElementById('spec'), data);
}

const drop = document.getElementById('drop'), input = document.getElementById('file');
drop.addEventListener('click', () => input.click());
input.addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });
['dragover', 'dragenter'].forEach(ev => drop.addEventListener(ev, e => {
  e.preventDefault(); drop.classList.add('drag');
}));
['dragleave', 'drop'].forEach(ev => drop.addEventListener(ev, e => {
  e.preventDefault(); drop.classList.remove('drag');
}));
drop.addEventListener('drop', e => { if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); });
</script>
</body>
</html>
